
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link href="css/style.css" rel="stylesheet">

    <title>Composer</title>
  </head>
  <body>

    <header class="container py-5 text-center" id="header1">
      <h1>Welcome to Music Composer!</h1>
    </header>

    <div class="container">
        <div class="d-flex flex-column align-items-center gap-3 text-center">
            <div id="dropzone" style="width:300px;height:150px;background-color: #0b5ed7;border:2px dashed #ffffff;display:flex;align-items:center;justify-content:center;color:#ffffff;"> Drop MIDI file here </div>
            <div class="d-flex align-items-center gap-3">
                <select id="modelSelect" class="form-select d-none" style="width:auto;"></select>

            </div>
            <div class="d-flex align-items-center gap-3">
                <a href="index.html"
                    class="card text-center shadow-sm p-4 text-decoration-none text-white bg-primary hover-card d-none" id="generate">
                    <h3>Generate MIDI</h3>
                </a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button id="downloadMidi" class="btn btn-success d-none" type="button">Download MIDI</button>
            </div>
        </div>
    </div>

    <script src="js/composer.js" type="module" defer></script>
  </body>
</html>
